<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emoji Sudoku</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Emoji Sudoku</h1>
  <p><a href="https://studentandwriter.com/" target="_blank">Students and Writers Blog</a></p>
</header>

<div class="container">

  <div id="picker">
    <h2>Choose 9 Emojis</h2>
    <div id="emojiList"></div>
    <button onclick="startGame()">Submit & Start Playing</button>
  </div>

  <div id="game" class="hidden">
    <div id="grid"></div>
    <div id="palette"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
